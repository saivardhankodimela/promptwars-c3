steps:
  # 1. Build the Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-backend:latest', './backend']
    id: 'build-backend'

  # 2. Build the Frontend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$_FIREBASE_APP_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  # 3. Push Backend Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-backend:latest']
    id: 'push-backend'

  # 4. Push Frontend Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-frontend:latest']
    id: 'push-frontend'

  # 5. Deploy Backend to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ecomind-backend'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-backend:latest'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT=$PROJECT_ID,VERTEX_AI_LOCATION=us-central1'
    id: 'deploy-backend'

  # 6. Deploy Frontend to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ecomind-frontend'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-frontend:latest'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-backend:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/ecomind-repo/ecomind-frontend:latest'

substitutions:
  _FIREBASE_API_KEY: 'placeholder-api-key'
  _FIREBASE_AUTH_DOMAIN: 'placeholder-auth-domain'
  _FIREBASE_PROJECT_ID: 'placeholder-project-id'
  _FIREBASE_STORAGE_BUCKET: 'placeholder-storage-bucket'
  _FIREBASE_MESSAGING_SENDER_ID: 'placeholder-messaging-sender-id'
  _FIREBASE_APP_ID: 'placeholder-app-id'
  _NEXT_PUBLIC_API_URL: 'placeholder-api-url'
